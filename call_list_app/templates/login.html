{% extends "base.html" %}
{% block title %}Login - Transition Board{% endblock %}
{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="bg-white shadow-lg rounded-xl p-8">
            <h2 class="text-center text-2xl font-bold text-gray-900 mb-1">⚡ Transition Board</h2>
            <p class="text-center text-sm text-gray-500 mb-6">ABC → Gymdesk Member Migration</p>
            <form method="POST">
                <label class="block text-sm font-medium text-gray-700 mb-2">Select your name</label>
                <select name="user_name" required title="Select your name" class="w-full rounded-lg border-gray-300 border px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 mb-4">
                    <option value="">Choose...</option>
                    {% for u in users %}
                    <option value="{{ u }}">{{ u }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="w-full rounded-lg bg-gray-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-gray-800 transition">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
